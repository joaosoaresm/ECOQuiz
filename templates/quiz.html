<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ECOQuiz - Perguntas</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
min-height: 100vh;
background: linear-gradient(135deg, #1a472a, #52b788);
font-family: 'Nunito', sans-serif;
display: flex;
flex-direction: column;
align-items: center;
padding: 30px;
}

header {
text-align: center;
margin-bottom: 20px;
}

header h1 {
color: white;
font-family: 'Fredoka One';
}

header p {
color: #b7e4c7;
}

.progress-bar-wrap {
width: 100%;
max-width: 600px;
background: rgba(255,255,255,0.2);
border-radius: 10px;
height: 10px;
margin-bottom: 20px;
}

.progress-bar-fill {
height: 100%;
background: #b7e4c7;
border-radius: 10px;
transition: width 0.3s;
}

.question-card {
background: white;
padding: 25px;
border-radius: 15px;
max-width: 600px;
width: 100%;
display: none;
}

.question-card.active {
display: block;
}

.options {
margin-top: 15px;
display: flex;
flex-direction: column;
gap: 10px;
}

.option-label {
padding: 10px;
border: 2px solid #b7e4c7;
border-radius: 10px;
cursor: pointer;
}

.option-label.correct { background: #d8f3dc; }
.option-label.wrong { background: #ffe0e3; }

.feedback-msg {
margin-top: 10px;
display: none;
font-weight: bold;
}

.feedback-msg.show { display: block; }

.btn-proximo {
margin-top: 15px;
padding: 10px;
background: #2d6a4f;
color: white;
border: none;
cursor: pointer;
display: none;
}

.btn-proximo.show {
display: block;
}
</style>
</head>

<body>

<header>
<h1>🌿 ECOQuiz</h1>
<p>Olá, <strong>{{ nome }}</strong>!</p>
</header>

<div class="progress-bar-wrap">
<div class="progress-bar-fill" id="progressBar"
style="width: {{ (1 / (perguntas|length) * 100) | round(1) if perguntas|length > 0 else 0 }}%">
</div>
</div>

<form action="/resultado" method="POST">

{% for p in perguntas %}
{% set i = loop.index0 %}

<div class="question-card {% if i == 0 %}active{% endif %}" id="card-{{ i }}">

<h3>Pergunta {{ i + 1 }} de {{ perguntas|length }}</h3>
<p>{{ p.pergunta }}</p>

<div class="options" id="options-{{ i }}">
{% for opcao in p.opcoes %}
<label class="option-label">
<input type="radio" name="q{{ i }}" value="{{ opcao }}"
data-correct="{{ p.resposta }}" data-qi="{{ i }}">
{{ opcao }}
</label>
{% endfor %}
</div>

<div class="feedback-msg" id="feedback-{{ i }}"></div>

<button type="{% if i == (perguntas|length) - 1 %}submit{% else %}button{% endif %}"
class="btn-proximo" id="btn-{{ i }}"
{% if i != (perguntas|length) - 1 %}onclick="proximaPergunta({{ i }})"{% endif %}>

{% if i == (perguntas|length) - 1 %}
Ver Resultado 🏆
{% else %}
Próxima →
{% endif %}
</button>

</div>

{% endfor %}

</form>

<script>
const total = {{ perguntas|length | tojson }};

// Seleção de resposta
document.querySelectorAll('input[type="radio"]').forEach(radio => {
radio.addEventListener('change', function () {

const qi = parseInt(this.dataset.qi);
const correta = this.dataset.correct;
const escolhida = this.value;

// 🔥 BLOQUEIA sem usar disabled
document.querySelectorAll(`#options-${qi} input`).forEach(r => {
    r.style.pointerEvents = "none";
});

// Marca opções
document.querySelectorAll(`#options-${qi} .option-label`).forEach(lbl => {
const val = lbl.querySelector('input').value;

if (val === correta) lbl.classList.add('correct');
else if (val === escolhida) lbl.classList.add('wrong');
});

// Feedback
const feedback = document.getElementById(`feedback-${qi}`);

if (escolhida === correta) {
feedback.textContent = '✅ Correto!';
} else {
feedback.textContent = `❌ Errado! Correta: ${correta}`;
}

feedback.classList.add('show');

// Botão próxima
document.getElementById(`btn-${qi}`).classList.add('show');

});
});

// Próxima pergunta
function proximaPergunta(atual) {
document.getElementById(`card-${atual}`).classList.remove('active');

const proximo = atual + 1;
document.getElementById(`card-${proximo}`).classList.add('active');

const pct = ((proximo + 1) / total * 100).toFixed(1);
document.getElementById('progressBar').style.width = pct + '%';

window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

</body>
</html>
